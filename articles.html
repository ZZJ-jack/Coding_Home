<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术博客 · Coding 文章</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', 'Roboto', 'Noto Sans CJK SC', sans-serif; }
        body { background:#0a0e17; color:#e0e0e0; overflow-x:hidden; min-height:100vh; }
        .matrix-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }
        .container { max-width:1200px; margin:0 auto; padding:20px; }
        header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid rgba(46,213,115,0.3); margin-bottom:40px; flex-wrap:wrap; gap:20px; }
        .logo { display:flex; align-items:center; gap:15px; }
        .logo-icon { font-size:2.5rem; color:#2ed573; }
        .logo-text { font-size:2rem; font-weight:700; background:linear-gradient(90deg,#2ed573,#1e90ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-buttons { display:flex; gap:20px; }
        .nav-button { padding:12px 24px; background:rgba(30,144,255,0.1); border:1px solid rgba(30,144,255,0.3); border-radius:8px; color:#e0e0e0; text-decoration:none; font-weight:600; transition:0.3s; }
        .nav-button:hover { background:rgba(30,144,255,0.2); transform:translateY(-3px); }
        .nav-button i { margin-right:8px; }
        .page-title { text-align:center; font-size:3rem; font-weight:700; margin-bottom:20px; background:linear-gradient(90deg,#2ed573,#1e90ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .subtitle { text-align:center; font-size:1.2rem; color:#a0a0a0; margin-bottom:40px; }
        .articles-grid { display:flex; flex-direction:column; gap:20px; margin-bottom:60px; }
        .article-card { background:rgba(20,25,40,0.7); border-radius:16px; padding:20px 28px; border:1px solid rgba(46,213,115,0.2); transition:0.2s; cursor:pointer; backdrop-filter:blur(2px); }
        .article-card:hover { border-color:#2ed573; transform:translateX(8px); background:rgba(30,144,255,0.1); }
        .article-title { font-size:1.6rem; font-weight:600; color:#e0e0e0; margin-bottom:8px; }
        .article-date { font-size:0.9rem; color:#2ed573; display:flex; align-items:center; gap:8px; }
        .no-articles { text-align:center; padding:60px; background:rgba(0,0,0,0.3); border-radius:24px; }
        
        /* 模态框 */
        .modal-mask { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.88); backdrop-filter:blur(10px); z-index:1000; display:flex; align-items:center; justify-content:center; visibility:hidden; opacity:0; transition:0.2s; }
        .modal-container { width:94%; max-width:1400px; max-height:92vh; background:#0c0f1a; border-radius:28px; border:1px solid #2ed573; overflow-y:auto; position:relative; padding:0; box-shadow:0 25px 45px rgba(0,0,0,0.6); }
        .modal-header { padding:22px 32px; border-bottom:1px solid rgba(46,213,115,0.4); display:flex; justify-content:space-between; align-items:center; background:#0a0d16; border-radius:28px 28px 0 0; position:sticky; top:0; z-index:10; }
        .modal-header h2 { color:#2ed573; font-size:1.7rem; font-weight:600; }
        .close-modal { background:none; border:none; font-size:34px; color:#aaa; cursor:pointer; transition:0.2s; padding:0 10px; }
        .close-modal:hover { color:#2ed573; transform:scale(1.1); }
        .modal-body { padding:40px 48px; color:#eaeef5; }
        
        /* Markdown 样式 - 表格完全重写确保清晰 */
        .markdown-body {
            background: transparent !important;
            color: #eaeef5 !important;
            font-size: 1.05rem;
            line-height: 1.75;
        }
        /* 表格样式：深色背景+高对比文字 */
        .markdown-body table {
            background: #0d111a;
            width: 100%;
            margin: 1.2em 0;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .markdown-body th {
            background: #1f2a3a !important;
            color: #d0ffd0 !important;
            font-weight: 700;
            padding: 12px 16px;
            border: 1px solid #2ed57380;
            text-align: center;
        }
        .markdown-body td {
            padding: 10px 14px;
            border: 1px solid #2ed57360;
            color: #f0f0f0 !important;
            background-color: inherit;
        }
        .markdown-body tr:nth-child(even) {
            background: #0f141f;
        }
        .markdown-body tr:nth-child(odd) {
            background: #0a0e17;
        }
        /* 标题保持亮色 */
        .markdown-body h1, .markdown-body h2, .markdown-body h3, 
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: #9effcf !important;
            border-bottom-color: rgba(46,213,115,0.4);
        }
        /* 代码块样式不变（用户已满意） */
        .markdown-body pre {
            position: relative;
            background: #1a1e2f !important;
            border-radius: 14px;
            padding: 18px;
            overflow-x: auto;
            border: 1px solid #2ed57330;
            margin: 1.2em 0;
        }
        .markdown-body pre code {
            background: transparent !important;
            color: #e2e8f0 !important;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
        }
        .markdown-body code {
            background: #1e2436 !important;
            color: #f8c555 !important;
            padding: 0.2em 0.4em;
            border-radius: 6px;
        }
        .copy-code-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #2ed57380;
            color: #2ed573;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            z-index: 5;
        }
        .copy-code-btn:hover {
            background: #2ed57320;
            border-color: #2ed573;
            color: white;
        }
        .copy-code-btn.copied {
            background: #2ed573;
            color: #0a0e17;
        }
        /* 引用块 */
        .markdown-body blockquote {
            border-left-color: #2ed573;
            background: rgba(46,213,115,0.08);
            padding: 0.8em 1.2em;
            border-radius: 8px;
        }
        .markdown-body a { color: #6eb5ff !important; }
        
        footer { text-align:center; padding:30px 0; border-top:1px solid rgba(46,213,115,0.3); margin-top:60px; }
        .footer-link { color:#2ed573; text-decoration:none; }
        
        @media (max-width:768px){ 
            .nav-buttons{ flex-direction:column; width:100%; } 
            .article-title{ font-size:1.2rem; }
            .modal-container { width:96%; }
            .modal-body { padding:22px; }
            .modal-header h2 { font-size:1.3rem; }
            .copy-code-btn { padding:3px 8px; font-size:0.7rem; }
        }
    </style>
</head>
<body>
<canvas class="matrix-canvas" id="matrixCanvas"></canvas>
<div class="container">
    <header>
        <div class="logo"><i class="fas fa-book-open logo-icon"></i><div class="logo-text">Coding 博客</div></div>
        <div class="nav-buttons"><a href="index.html" class="nav-button"><i class="fas fa-home"></i> 主页</a></div>
    </header>
    <div class="page-title">📖 技术文章</div>
    <div id="articlesList" class="articles-grid"><div style="text-align:center;padding:60px"><i class="fas fa-spinner fa-pulse"></i> 正在加载文章列表...</div></div>
    <footer><p class="footer-text">Developed by <a href="https://zzjjack.us.kg" class="footer-link" target="_blank">ZZJ</a> and <a href="https://www.luogu.com.cn/team/104545" class="footer-link" target="_blank">Coding Team</a></p><p class="footer-text">2026, Coding</p></footer>
</div>
<div id="articleModal" class="modal-mask"><div class="modal-container"><div class="modal-header"><h2 id="modalTitle"></h2><button class="close-modal" id="closeModalBtn">&times;</button></div><div class="modal-body" id="modalContent"><div style="text-align:center">加载中...</div></div></div></div>

<script>
    // ---------- 性能优化：缓存文章内容与列表 ----------
    const articleCache = new Map();
    let articlesListCache = null;

    // 模态框控制
    const modal = document.getElementById('articleModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');
    function closeModal(){ modal.style.visibility='hidden'; modal.style.opacity='0'; }
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

    // 为代码块添加复制按钮（批量、异步，避免阻塞渲染）
    function addCopyButtonsToCodeBlocks() {
        // 使用 requestAnimationFrame 延迟执行，让主要内容先显示
        requestAnimationFrame(() => {
            const preBlocks = modalContent.querySelectorAll('.markdown-body pre');
            preBlocks.forEach(pre => {
                if (pre.querySelector('.copy-code-btn')) return;
                const code = pre.querySelector('code');
                if (!code) return;
                const btn = document.createElement('button');
                btn.className = 'copy-code-btn';
                btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                btn.onclick = async (e) => {
                    e.stopPropagation();
                    const text = code.innerText;
                    try {
                        await navigator.clipboard.writeText(text);
                        btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                            btn.classList.remove('copied');
                        }, 2000);
                    } catch {
                        btn.innerHTML = '<i class="fas fa-times"></i> 失败';
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
                        }, 1500);
                    }
                };
                pre.style.position = 'relative';
                pre.appendChild(btn);
            });
        });
    }

    // 加载并渲染 Markdown（带缓存）
    async function fetchMarkdownAndShow(filePath, displayTitle) {
        modalTitle.innerText = displayTitle;
        if (articleCache.has(filePath)) {
            modalContent.innerHTML = articleCache.get(filePath);
            addCopyButtonsToCodeBlocks();
            modal.style.visibility = 'visible';
            modal.style.opacity = '1';
            return;
        }
        modalContent.innerHTML = '<div style="text-align:center"><i class="fas fa-spinner fa-pulse"></i> 加载文章内容...</div>';
        modal.style.visibility = 'visible';
        modal.style.opacity = '1';
        try {
            const resp = await fetch(filePath);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const blob = await resp.blob();
            const raw = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsText(blob, 'UTF-8');
            });
            let content = raw;
            if (content.trim().startsWith('---')) {
                const endIndex = content.indexOf('---', 3);
                if (endIndex !== -1) content = content.substring(endIndex + 3);
            }
            // marked.parse 返回 Promise，直接 await
            const html = await marked.parse(content);
            const finalHtml = `<div class="markdown-body">${html}</div>`;
            articleCache.set(filePath, finalHtml);
            modalContent.innerHTML = finalHtml;
            addCopyButtonsToCodeBlocks();
        } catch (err) {
            modalContent.innerHTML = `<div style="color:#ff8a8a"><i class="fas fa-exclamation-triangle"></i> 无法加载文章: ${err.message}</div>`;
        }
    }

    // 加载文章列表（带缓存）
    async function loadArticlesFromConfig() {
        const container = document.getElementById('articlesList');
        if (articlesListCache) {
            renderArticleList(articlesListCache);
            return;
        }
        try {
            const response = await fetch('./post/articles.json');
            if (!response.ok) throw new Error('articles.json 未找到');
            const data = await response.json();
            if (!data.articles || !Array.isArray(data.articles) || data.articles.length === 0) {
                container.innerHTML = `<div class="no-articles"><i class="fas fa-folder-open"></i><p>暂无文章，请在 ./post/articles.json 中添加文章索引</p></div>`;
                return;
            }
            const articles = [...data.articles].sort((a,b) => (b.date || '').localeCompare(a.date || ''));
            articlesListCache = articles;
            renderArticleList(articles);
        } catch (err) {
            container.innerHTML = `<div class="no-articles"><i class="fas fa-database"></i><p>无法加载 articles.json，请确保文件存在且格式正确。</p></div>`;
        }
    }

    function renderArticleList(articles) {
        const container = document.getElementById('articlesList');
        container.innerHTML = articles.map(art => `
            <div class="article-card" data-path="${art.path}" data-title="${escapeHtml(art.title)}">
                <div class="article-title">${escapeHtml(art.title)}</div>
                <div class="article-date"><i class="far fa-calendar-alt"></i> ${art.date || '日期不详'}</div>
            </div>
        `).join('');
        document.querySelectorAll('.article-card').forEach(card => {
            card.addEventListener('click', () => {
                const path = card.getAttribute('data-path');
                const title = card.getAttribute('data-title');
                fetchMarkdownAndShow(path, title);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // 矩阵雨背景（保持原样）
    function createMatrixEffect() {
        const canvas = document.getElementById('matrixCanvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const fontSize = 16, chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const cols = Math.floor(canvas.width / fontSize);
        const drops = new Array(cols).fill(0);
        function draw() {
            ctx.fillStyle = 'rgba(10,14,23,0.06)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#1e90ff'; ctx.font = `${fontSize}px monospace`;
            drops.forEach((y,i) => {
                const ch = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(ch, i*fontSize, y*fontSize);
                if (y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        draw();
    }

    window.addEventListener('load', () => {
        createMatrixEffect();
        loadArticlesFromConfig();
    });
</script>
</body>
</html>
